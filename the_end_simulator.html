<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Ecosystem Simulator - The End</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;
  font-family:'Segoe UI',Arial,sans-serif;background:#130c1c;}
#svg{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:14px;left:14px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
#ui>*{pointer-events:all;}
#panel{background:#221730ee;color:#f2e6ff;padding:11px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.5);font-size:12px;line-height:1.9;max-width:195px;border:1px solid #4a3366;}
#panel strong{display:block;font-size:13px;margin-bottom:1px;color:#c984ff;}
#panel span{color:#b39ec7;font-size:11px;display:block;}
#legend{background:#221730ee;color:#f2e6ff;padding:10px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.5);font-size:11px;
  display:flex;flex-direction:column;gap:4px;border:1px solid #4a3366;}
.lr{display:flex;align-items:center;gap:7px;}
.lsep{height:1px;background:#4a3366;margin:3px 0;}
#btns{position:fixed;top:14px;right:14px;z-index:200;display:flex;gap:6px;}
#btns button{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;
  background:#221730;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5);font-size:18px;line-height:1;border:1px solid #4a3366;}
#btns button:hover{background:#38254f;}
#resetbtn{position:fixed;top:56px;right:14px;z-index:200;border:none;
  border-radius:8px;cursor:pointer;padding:6px 14px;
  background:#221730;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5);font-size:12px;border:1px solid #4a3366;}
#resetbtn:hover{background:#38254f;}

/* Dynamic fade animation for the highlights */
.node-shade {
  transition: opacity 0.6s ease-out;
  opacity: 0;
}
.node-shade.active {
  opacity: 0.35;
}

/* Container for inter-dimensional portals */
#dimension-container {
  background: #221730ee;
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
  max-width: 195px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border: 1px solid #4a3366;
}
.dimension-link {
  display: block;
  text-align: center;
  text-decoration: none;
  color: white !important;
  font-weight: 600;
  padding: 8px 0;
  border-radius: 6px;
  transition: background 0.2s;
  font-size: 12px;
}
.link-overworld {
  background: #2e6f40;
}
.link-overworld:hover {
  background: #1e4a2a;
}
.link-nether {
  background: #a83b3b;
}
.link-nether:hover {
  background: #782424;
}
</style>
</head>
<body>
<svg id="svg" xmlns="http://www.w3.org/2000/svg">
<defs id="defs">
  <marker id="mBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#1e90ff"/>
  </marker>
  <marker id="mRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#ff4444"/>
  </marker>
  
  <radialGradient id="gradBlue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1e90ff" stop-opacity="1"/>
    <stop offset="60%" stop-color="#1e90ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gradRed" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4444" stop-opacity="1"/>
    <stop offset="60%" stop-color="#ff4444" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect x="-5000" y="-5000" width="20000" height="20000" fill="#130c1c"/>
<g id="vp">
  <g id="gGroups"></g>
  <g id="gLinks"></g>
  <g id="gPulses"></g>
  <g id="gShades"></g> 
  <g id="gNodes"></g>
</g>
</svg>

<div id="ui">
  <div id="panel">
    <strong>The End Simulator</strong>
    <span>Click node → increase</span>
    <span>Shift+click → decrease</span>
    <span>Drag to pan · scroll to zoom</span>
  </div>

  <div id="dimension-container">
    <a href="index.html" class="dimension-link link-overworld">Travel to Overworld 🌍</a>
    <a href="nether_simulator.html" class="dimension-link link-nether">Travel to The Nether 🔥</a>
  </div>

  <div id="legend">
    <div class="lr">
      <svg width="18" height="14"><rect x="1" y="1" width="16" height="12" rx="3" fill="#ecd9ff" stroke="#8942cc" stroke-width="1.5"/></svg>
      Chorus Flora
    </div>
    <div class="lr">
      <svg width="18" height="14"><rect x="1" y="1" width="16" height="12" rx="3" fill="#d8e8ff" stroke="#0037b3" stroke-width="1.5"/></svg>
      Player &amp; Gear
    </div>
    <div class="lr">
      <svg width="18" height="14"><circle cx="9" cy="7" r="6" fill="#f5d6ff" stroke="#aa00cc" stroke-width="1.5"/></svg>
      End Inhabitants
    </div>
    <div class="lr">
      <svg width="18" height="14"><polygon points="9,1 17,7 9,13 1,7" fill="#f3efcc" stroke="#a39630" stroke-width="1.5"/></svg>
      End Structures
    </div>
    <div class="lsep"></div>
    <div class="lr">
      <svg width="30" height="10"><line x1="2" y1="5" x2="24" y2="5" stroke="#1e90ff" stroke-width="2"/></svg>
      Reinforce
    </div>
    <div class="lr">
      <svg width="30" height="10"><line x1="2" y1="5" x2="24" y2="5" stroke="#ff4444" stroke-width="2" stroke-dasharray="5 2"/></svg>
      Suppress
    </div>
  </div>
</div>
<div id="btns">
  <button onclick="zoomBy(1.2)">+</button>
  <button onclick="zoomBy(0.83)">−</button>
</div>
<button id="resetbtn" onclick="resetAll()">↺ Reset</button>

<script>
const NS='http://www.w3.org/2000/svg';
const svgEl  =document.getElementById('svg');
const vp     =document.getElementById('vp');
const gGroups=document.getElementById('gGroups');
const gLinks =document.getElementById('gLinks');
const gPulses=document.getElementById('gPulses');
const gShades=document.getElementById('gShades');
const gNodes =document.getElementById('gNodes');
const defsEl =document.getElementById('defs');

function se(t){return document.createElementNS(NS,t);}
function sa(e,o){for(const[k,v]of Object.entries(o))e.setAttribute(k,String(v));return e;}

// ── CATEGORY STYLES ───────────────────────────────────────────────────────────
const CAT={
  flora:{
    shape:'rect',
    groupFill:'#291d38',groupStroke:'#684299',
    nodeFill:'#ecd9ff',nodeDark:'#661fcc',nodeBorder:'#8942cc',
    label:'Chorus Flora'
  },
  player_defense:{
    shape:'rect',
    groupFill:'#1a2636',groupStroke:'#3b6299',
    nodeFill:'#d8e8ff',nodeDark:'#0037b3',nodeBorder:'#2255cc',
    label:'Player & Gear'
  },
  mobs:{
    shape:'circle',
    groupFill:'#2d1836',groupStroke:'#8f1ebd',
    nodeFill:'#f5d6ff',nodeDark:'#550080',nodeBorder:'#aa00cc',
    label:'End Inhabitants'
  },
  structures:{
    shape:'diamond',
    groupFill:'#2e2d24',groupStroke:'#8c8238',
    nodeFill:'#f3efcc',nodeDark:'#736814',nodeBorder:'#a39630',
    label:'End Structures'
  }
};

// ── NODE LAYOUT ───────────────────────────────────────────────────────────────
const NODES={
  Player:       {x:160, y:130, cat:'player_defense', val:50, label:'Player'},
  Elytra:       {x:160, y:330, cat:'player_defense', val:50, label:'Elytra'},

  ChorusPlant:  {x:430, y:130, cat:'flora',          val:50, label:'Chorus Plant'},
  ChorusFruit:  {x:430, y:330, cat:'flora',          val:50, label:'Chorus Fruit'},

  EnderDragon:  {x:700, y:130, cat:'mobs',           val:50, label:'Ender Dragon'},
  Enderman:     {x:700, y:330, cat:'mobs',           val:50, label:'Enderman'},
  Shulker:      {x:700, y:530, cat:'mobs',           val:50, label:'Shulker'},

  ObsidianPillar:{x:160,y:630, cat:'structures',     val:50, label:'Obsidian\nPillars'},
  EndCity:      {x:430, y:630, cat:'structures',     val:50, label:'End City'},
  EndShip:      {x:700, y:730, cat:'structures',     val:50, label:'End Ship'}
};

const EDGES=[
  ['EnderDragon',  'Player',        -1],
  ['Player',       'EnderDragon',   -1],
  ['ObsidianPillar','EnderDragon',   1],
  ['Player',       'ObsidianPillar',-1],
  ['Player',       'Enderman',      -1],
  ['Enderman',     'Player',        -1],
  ['Enderman',     'ChorusPlant',   -1],
  ['ChorusPlant',  'ChorusFruit',    1],
  ['ChorusFruit',  'Player',         1],
  ['EndCity',      'Shulker',        1],
  ['Player',       'Shulker',       -1],
  ['Shulker',      'Player',        -1],
  ['EndCity',      'EndShip',        1],
  ['EndShip',      'Elytra',         1],
  ['Elytra',       'Player',         1]
];

// ── GROUP BACKGROUND BOXES ────────────────────────────────────────────────────
const GROUP_BOUNDS={
  player_defense: {x:90,  y:60,  w:140, h:340, label:'Player & Gear'},
  flora:          {x:360, y:60,  w:140, h:340, label:'Chorus Flora'},
  mobs:           {x:630, y:60,  w:140, h:540, label:'End Inhabitants'},
  structures:     {x:90,  y:560, w:710, h:240, label:'End Structures'}
};

Object.entries(GROUP_BOUNDS).forEach(([cat,b])=>{
  const c=CAT[cat];
  const shadow=se('rect');
  sa(shadow,{x:b.x+4,y:b.y+4,width:b.w,height:b.h,rx:18,fill:'#00000030'});
  gGroups.appendChild(shadow);

  const box=se('rect');
  sa(box,{x:b.x,y:b.y,width:b.w,height:b.h,rx:18,fill:c.groupFill,stroke:c.groupStroke,'stroke-width':'2',opacity:'0.75'});
  gGroups.appendChild(box);

  const txt=se('text');
  sa(txt,{x:b.x+16,y:b.y+22,'font-family':'Segoe UI,Arial,sans-serif','font-size':'12','font-weight':'700',fill:c.nodeBorder,opacity:'0.9','pointer-events':'none'});
  txt.textContent=b.label;
  gGroups.appendChild(txt);
});

// ── SHAPE GEOMETRY ────────────────────────────────────────────────────────────
const SH={rect:64,circle:88,diamond:68};
const ST={rect:-32,circle:-44,diamond:-34};

function makeShapeEl(shape,fillCol,strokeCol,sw){
  let e;
  if(shape==='circle'){
    e=se('circle');
    sa(e,{r:'44',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'});
  }else if(shape==='diamond'){
    e=se('polygon');
    sa(e,{points:'0,-34 52,0 0,34 -52,0',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'});
  }else{
    e=se('rect');
    sa(e,{x:'-58',y:'-32',width:'116',height:'64',rx:'10',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'});
  }
  return e;
}

// ── CLIP PATHS ────────────────────────────────────────────────────────────────
const clipRects={};
for(const name of Object.keys(NODES)){
  const cp=se('clipPath');sa(cp,{id:'cp_'+name});
  const cr=se('rect');sa(cr,{x:'-80',y:'200',width:'200',height:'0'});
  cp.appendChild(cr);defsEl.appendChild(cp);
  clipRects[name]=cr;
}

// ── BUILD NODES ───────────────────────────────────────────────────────────────
const nodeEls={};
for(const[name,nd]of Object.entries(NODES)){
  const c=CAT[nd.cat];
  const sh=c.shape;
  const g=se('g');
  sa(g,{transform:`translate(${nd.x},${nd.y})`});
  g.style.cursor='pointer';

  const bg=makeShapeEl(sh,c.nodeFill,c.nodeBorder,'2.5');
  g.appendChild(bg);

  const fillEl=makeShapeEl(sh,c.nodeDark,'none','0');
  sa(fillEl,{'clip-path':`url(#cp_${name})`});
  g.appendChild(fillEl);

  const lines=nd.label.split('\n');
  const lh=13;
  const labelEls=lines.map((line,i)=>{
    const t=se('text');
    t.textContent=line;
    sa(t,{x:'0',y:String((i-(lines.length-1)/2)*lh-6),'text-anchor':'middle','dominant-baseline':'middle','font-family':'Segoe UI,Arial,sans-serif','font-size':'11','font-weight':'600',fill:'#1a1a1a','pointer-events':'none'});
    g.appendChild(t);
    return t;
  });

  const valEl=se('text');
  sa(valEl,{x:'0',y:String(lines.length*lh/2+5),'text-anchor':'middle','dominant-baseline':'middle','font-family':'Segoe UI,Arial,sans-serif','font-size':'10',fill:'#333','pointer-events':'none'});
  g.appendChild(valEl);

  g.addEventListener('click',e=>{
    e.stopPropagation();
    propagate(name,e.shiftKey?-10:10);
  });

  gNodes.appendChild(g);
  nodeEls[name]={labelEls,valEl};
  renderNode(name);
}

function renderNode(name){
  const nd=NODES[name];
  nd.val=Math.max(0,Math.min(100,nd.val));
  const pct=nd.val/100;
  const sh=CAT[nd.cat].shape;
  const fh=SH[sh],ty=ST[sh];
  const fillH=fh*pct;
  const cr=clipRects[name];
  cr.setAttribute('y',String(ty+fh-fillH));
  cr.setAttribute('height',String(fillH+2));
  const{labelEls,valEl}=nodeEls[name];
  valEl.textContent=Math.round(nd.val)+'%';
  const bright=pct>0.55;
  labelEls.forEach(t=>t.setAttribute('fill',bright?'#ffffff':'#1a1a1a'));
  valEl.setAttribute('fill',bright?'#ffffffcc':'#333333');
}

// ── EDGES & ORTHOGONAL ROUTING ────────────────────────────────────────────────
function orthogonalPath(x1,y1,x2,y2,offset=0){
  const mx=(x1+x2)/2+offset;
  return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${x2} ${y2}`;
}

function orthogonalPoint(x1,y1,x2,y2,offset,t){
  const mx=(x1+x2)/2+offset;
  const segs=[
    {x1:x1,y1:y1,x2:mx,y2:y1},
    {x1:mx,y1:y1,x2:mx,y2:y2},
    {x1:mx,y1:y2,x2:x2,y2:y2}
  ];
  const lens=segs.map(s=>Math.hypot(s.x2-s.x1,s.y2-s.y1));
  const total=lens.reduce((a,b)=>a+b,0);
  let dist=t*total;
  for(let i=0;i<segs.length;i++){
    if(dist<=lens[i]){
      const p=dist/lens[i];
      return{
        x:segs[i].x1+(segs[i].x2-segs[i].x1)*p,
        y:segs[i].y1+(segs[i].y2-segs[i].y1)*p
      };
    }
    dist-=lens[i];
  }
  return{x:x2,y:y2};
}

const edgeData=[];
let edgeIndex=0;
for(const[from,to,pol]of EDGES){
  const a=NODES[from];
  const b=NODES[to];
  const lane=((edgeIndex%7)-3)*22;
  edgeIndex++;

  const path=se('path');
  sa(path,{
    d:orthogonalPath(a.x,a.y,b.x,b.y,lane),
    fill:'none',
    stroke:pol>0?'#1e90ff':'#ff4444',
    'stroke-width':'2',
    'stroke-dasharray':pol<0?'7 4':'none',
    'marker-end':pol>0?'url(#mBlue)':'url(#mRed)',
    opacity:'0.5'
  });

  gLinks.appendChild(path);
  edgeData.push({from,to,pol,lane,path});
}

function flashEdge(from,to){
  const e=edgeData.find(e=>e.from===from&&e.to===to);
  if(!e)return;
  e.path.setAttribute('opacity','1');
  e.path.setAttribute('stroke-width','3.2');
  setTimeout(()=>{e.path.setAttribute('opacity','0.5');e.path.setAttribute('stroke-width','2');},700);
}

// ── SHADE HIGHLIGHT GENERATOR ───────────────────────────────────────────────
function spawnNodeShade(nodeName, isIncrease, delayMs) {
  setTimeout(() => {
    const node = NODES[nodeName];
    const shade = se('circle');
    sa(shade, {
      cx: node.x,
      cy: node.y,
      r: '95',
      fill: isIncrease ? 'url(#gradBlue)' : 'url(#gradRed)',
      class: 'node-shade'
    });
    gShades.appendChild(shade);
    requestAnimationFrame(() => {
      shade.classList.add('active');
    });
  }, delayMs);
}

// ── PULSE ANIMATION & SYNCHRONIZED PROPAGATION ───────────────────────────────
const PULSE_SPEED = 0.013;

function animatePulse(from,to,delta,delayMs){
  setTimeout(() => {
    const a=NODES[from],b=NODES[to];
    const col=delta>0?'#1e90ff':'#ff4444';
    const g=se('g');
    const dot=se('circle'); sa(dot, {r:'9', fill:col, opacity:'0.9'}); g.appendChild(dot);
    gPulses.appendChild(g);

    let t=0;
    function step(){
      t += PULSE_SPEED;
      const edge = edgeData.find(e=>e.from===from && e.to===to);
      if(!edge) { g.remove(); return; }
      const pt = orthogonalPoint(a.x, a.y, b.x, b.y, edge.lane, Math.min(t,1));
      g.setAttribute('transform',`translate(${pt.x},${pt.y})`);
      if(t<1){
        requestAnimationFrame(step);
      }else{
        g.remove();
      }
    }
    requestAnimationFrame(step);
  }, delayMs);
}

function propagate(startName,delta){
  gShades.innerHTML = '';
  NODES[startName].val+=delta;
  renderNode(startName);
  const isIncrease = delta > 0;
  spawnNodeShade(startName, isIncrease, 0);

  const queue=[{node:startName,delta,time:0,depth:0}];
  const visited=new Set([startName]);
  const travelDuration = (1 / PULSE_SPEED) * 16.67; 
  const totalStepDelay = travelDuration + 120; 

  while(queue.length){
    const cur=queue.shift();
    if(cur.depth >= 5)continue;
    for(const[from,to,pol]of EDGES){
      if(from!==cur.node)continue;
      const nd=cur.delta*pol*0.65;
      const nt=cur.time + totalStepDelay; 
      animatePulse(from,to,nd,cur.time);
      const targetIsIncrease = nd > 0;
      spawnNodeShade(to, targetIsIncrease, nt);
      setTimeout(()=>{
        NODES[to].val+=nd;
        renderNode(to);
        flashEdge(from,to);
      }, nt);
      if(!visited.has(to)){
        visited.add(to);
        queue.push({node:to,delta:nd,time:nt,depth:cur.depth+1});
      }
    }
  }
}

function resetAll(){
  gShades.innerHTML = '';
  for(const n of Object.values(NODES))n.val=50;
  for(const name of Object.keys(NODES))renderNode(name);
}

// ── PAN & ZOOM ────────────────────────────────────────────────────────────────
let pan={x:0,y:0},scale=1,panning=false,ps={x:0,y:0};
function applyT(){vp.setAttribute('transform',`translate(${pan.x},${pan.y}) scale(${scale})`);}

const windowW = window.innerWidth || 1200;
const windowH = window.innerHeight || 800;
scale = Math.min((windowW - 60) / 1080, (windowH - 60) / 970, 1) * 0.92;
pan = { x: (windowW - 1080 * scale) / 2, y: (windowH - 970 * scale) / 2 };
applyT();

window.addEventListener('resize',()=>{
  const rW=window.innerWidth,rH=window.innerHeight;
  scale=Math.min((rW-60)/1080,(rH-60)/970,1)*0.92;
  pan={x:(rW-1080*scale)/2,y:(rH-970*scale)/2};
  applyT();
});

svgEl.addEventListener('wheel',e=>{
  e.preventDefault();
  scale=Math.max(0.2,Math.min(3,scale*(e.deltaY<0?1.1:0.91)));
  applyT();
},{passive:false});

svgEl.addEventListener('mousedown',e=>{
  const tg=e.target;
  if(tg===svgEl||tg.id==='vp'||tg.id==='gGroups'||tg.tagName==='rect'&&tg.getAttribute('x')==='-5000'){
    panning=true;ps={x:e.clientX-pan.x,y:e.clientY-pan.y};
    svgEl.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  pan={x:e.clientX-ps.x,y:e.clientY-ps.y};applyT();
});
window.addEventListener('mouseup',()=>{panning=false;svgEl.style.cursor='';});

function zoomBy(f){scale=Math.max(0.2,Math.min(3,scale*f));applyT();}
</script>
</body>
</html>
