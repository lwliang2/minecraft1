<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Ecosystem Simulator</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;
  font-family:'Segoe UI',Arial,sans-serif;background:#dde1ea;}
#svg{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:14px;left:14px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
#ui>*{pointer-events:all;}
#panel{background:#ffffffee;padding:11px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:12px;line-height:1.9;max-width:195px;}
#panel strong{display:block;font-size:13px;margin-bottom:1px;}
#panel span{color:#555;font-size:11px;display:block;}
#legend{background:#ffffffee;padding:10px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:11px;
  display:flex;flex-direction:column;gap:4px;}
.lr{display:flex;align-items:center;gap:7px;}
.lsep{height:1px;background:#ddd;margin:3px 0;}
#btns{position:fixed;top:14px;right:14px;z-index:200;display:flex;gap:6px;}
#btns button{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:18px;line-height:1;}
#btns button:hover{background:#e0e3ec;}
#resetbtn{position:fixed;top:56px;right:14px;z-index:200;border:none;
  border-radius:8px;cursor:pointer;padding:6px 14px;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;}
#resetbtn:hover{background:#e0e3ec;}

/* Dynamic fade animation for the highlights */
.node-shade {
  transition: opacity 0.6s ease-out;
  opacity: 0;
}
.node-shade.active {
  opacity: 0.35;
}

/* Isolated container for inter-dimensional portals */
#dimension-container {
  background: #ffffffee;
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  max-width: 195px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.dimension-link {
  display: block;
  text-align: center;
  text-decoration: none;
  color: white !important;
  font-weight: 600;
  padding: 8px 0;
  border-radius: 6px;
  transition: background 0.2s;
  font-size: 12px;
}
.link-end {
  background: #7b52ab;
}
.link-end:hover {
  background: #522685;
}
.link-nether {
  background: #a83b3b;
}
.link-nether:hover {
  background: #782424;
}
</style>
</head>
<body>

<defs id="defs">
  <marker id="mBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#1e90ff"/>
  </marker>
  <marker id="mRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#ff4444"/>
  </marker>
  
  <radialGradient id="gradBlue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1e90ff" stop-opacity="1"/>
    <stop offset="60%" stop-color="#1e90ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gradRed" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4444" stop-opacity="1"/>
    <stop offset="60%" stop-color="#ff4444" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect x="-5000" y="-5000" width="20000" height="20000" fill="#dde1ea"/>
<g id="vp">
  <g id="gGroups"></g>
  <g id="gLinks"></g>
  <g id="gPulses"></g>
  <g id="gShades"></g> <g id="gNodes"></g>
</g>
</svg>

<div id="ui">
  <div id="panel">
    <strong>Minecraft Ecosystem Simulator</strong>
    <span>Click node → increase</span>
    <span>Shift+click → decrease</span>
    <span>Drag to pan · scroll to zoom</span>
  </div>
  
  <div id="dimension-container">
    <a href="nether_simulator.html" class="dimension-link link-nether">Travel to The Nether 🔥</a>
