<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Ecosystem Simulator - Overworld</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;
  font-family:'Segoe UI',Arial,sans-serif;background:#dde1ea;}
#svg{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:14px;left:14px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
#ui>*{pointer-events:all;}
#panel{background:#ffffffee;padding:11px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:12px;line-height:1.9;max-width:195px;}
#panel strong{display:block;font-size:13px;margin-bottom:1px;}
#panel span{color:#555;font-size:11px;display:block;}
#legend{background:#ffffffee;padding:10px 14px;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:11px;
  display:flex;flex-direction:column;gap:4px;}
.lr{display:flex;align-items:center;gap:7px;}
.lsep{height:1px;background:#ddd;margin:3px 0;}
#btns{position:fixed;top:14px;right:14px;z-index:200;display:flex;gap:6px;}
#btns button{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:18px;line-height:1;}
#btns button:hover{background:#e0e3ec;}
#resetbtn{position:fixed;top:56px;right:14px;z-index:200;border:none;
  border-radius:8px;cursor:pointer;padding:6px 14px;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;}
#resetbtn:hover{background:#e0e3ec;}

.node-shade {
  transition: opacity 0.6s ease-out;
  opacity: 0;
}
.node-shade.active {
  opacity: 0.35;
}

#dimension-container {
  background: #ffffffee;
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  max-width: 195px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.dimension-link {
  display: block;
  text-align: center;
  text-decoration: none;
  color: white !important;
  font-weight: 600;
  padding: 8px 0;
  border-radius: 6px;
  transition: background 0.2s;
  font-size: 12px;
}
.link-end { background: #7b52ab; }
.link-end:hover { background: #522685; }
.link-nether { background: #a83b3b; }
.link-nether:hover { background: #782424; }

/* Overworld ambient drift: pollen / leaves */
@keyframes leafDrift {
  0%   { transform: translate(0px,0px) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.55; }
  90%  { opacity: 0.45; }
  100% { transform: translate(40px,140px) rotate(70deg); opacity: 0; }
}
.ow-leaf {
  animation: leafDrift 11s infinite linear;
}
</style>
</head>
<body>
<svg id="svg" xmlns="http://www.w3.org/2000/svg">
<defs id="defs">
  <marker id="mBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#1e90ff"/>
  </marker>
  <marker id="mRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="#ff4444"/>
  </marker>
  
  <radialGradient id="gradBlue" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1e90ff" stop-opacity="1"/>
    <stop offset="60%" stop-color="#1e90ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gradRed" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4444" stop-opacity="1"/>
    <stop offset="60%" stop-color="#ff4444" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gradSun" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fff7d6" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#fff7d6" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect x="-5000" y="-5000" width="20000" height="20000" fill="#dde1ea"/>
<g id="gSunGlow"></g>
<g id="gLeaves"></g>
<g id="vp">
  <g id="gGroups"></g>
  <g id="gLinks"></g>
  <g id="gPulses"></g>
  <g id="gShades"></g> 
  <g id="gNodes"></g>
</g>
</svg>

<div id="ui">
  <div id="panel">
    <strong>Overworld Ecosystem</strong>
    <span>Click node → increase</span>
    <span>Shift+click → decrease</span>
    <span>Drag to pan · scroll to zoom</span>
  </div>

  <div id="dimension-container">
    <a href="nether_simulator.html" class="dimension-link link-nether">Travel to The Nether 🔥</a>
    <a href="the_end_simulator.html" class="dimension-link link-end">Travel to The End 🌌</a>
  </div>

  <div id="legend">
    <div class="lr">
      <svg width="18" height="14"><rect x="1" y="1" width="16" height="12" rx="3" fill="#fde8d8" stroke="#c45c1a" stroke-width="1.5"/></svg>
      Flora
    </div>
    <div class="lr">
      <svg width="18" height="14"><rect x="1" y="1" width="16" height="12" rx="3" fill="#d8e8ff" stroke="#0037b3" stroke-width="1.5"/></svg>
      Player &amp; Defenses
    </div>
    <div class="lr">
      <svg width="18" height="14"><circle cx="9" cy="7" r="6" fill="#d4f5d4" stroke="#007a00" stroke-width="1.5"/></svg>
      Fauna
    </div>
    <div class="lr">
      <svg width="18" height="14"><polygon points="9,1 17,7 9,13 1,7" fill="#fff3cc" stroke="#9a7000" stroke-width="1.5"/></svg>
      Hostile Mobs
    </div>
    <div class="lr">
      <svg width="18" height="14"><polygon points="9,1 17,7 9,13 1,7" fill="#daeeff" stroke="#005fa3" stroke-width="1.5"/></svg>
      Settlements
    </div>
  </div>
</div>
<div id="btns">
  <button onclick="zoomBy(1.2)">+</button>
  <button onclick="zoomBy(0.83)">−</button>
</div>
<button id="resetbtn" onclick="resetAll()">↺ Reset</button>

<script>
const NS='http://www.w3.org/2000/svg';
const svgEl  =document.getElementById('svg');
const vp     =document.getElementById('vp');
const gGroups=document.getElementById('gGroups');
const gLinks =document.getElementById('gLinks');
const gPulses=document.getElementById('gPulses');
const gShades=document.getElementById('gShades');
const gNodes =document.getElementById('gNodes');
const defsEl =document.getElementById('defs');

function se(t){return document.createElementNS(NS,t);}
function sa(e,o){for(const[k,v]of Object.entries(o))e.setAttribute(k,String(v));return e;}

const gSunGlow=document.getElementById('gSunGlow');
const gLeaves =document.getElementById('gLeaves');

// Soft dappled sunlight patches across the canvas
const SUN_PATCHES=[
  {x:150,y:150,r:240},{x:760,y:280,r:280},{x:320,y:680,r:260},
  {x:880,y:740,r:220},{x:520,y:430,r:300}
];
SUN_PATCHES.forEach(p=>{
  const c=se('circle'); sa(c,{cx:p.x,cy:p.y,r:p.r,fill:'url(#gradSun)'}); gSunGlow.appendChild(c);
});

// Drifting leaf / pollen particles
const LEAF_COUNT=40;
for(let i=0;i<LEAF_COUNT;i++){
  const isLeaf=Math.random()<0.5;
  const x=Math.random()*1080, y=Math.random()*970;
  const dur=(9+Math.random()*6).toFixed(2), delay=(Math.random()*10).toFixed(2);
  let el;
  if(isLeaf){
    el=se('ellipse');
    const rx=3+Math.random()*2, ry=1.6+Math.random();
    sa(el,{cx:x,cy:y,rx:rx,ry:ry,fill:Math.random()<0.5?'#7a9c4e':'#c9a23a',class:'ow-leaf'});
  } else {
    el=se('circle');
    const r=1+Math.random()*1.4;
    sa(el,{cx:x,cy:y,r:r,fill:'#fff2c2',class:'ow-leaf'});
  }
  el.style.animationDuration=dur+'s';
  el.style.animationDelay='-'+delay+'s';
  gLeaves.appendChild(el);
}

const CAT={
  flora:{ shape:'rect', groupFill:'#fde8d8', groupStroke:'#d4845a', nodeFill:'#fde8d8', nodeDark:'#b34a10', nodeBorder:'#c45c1a' },
  player_defense:{ shape:'rect', groupFill:'#d8e8ff', groupStroke:'#6699dd', nodeFill:'#d8e8ff', nodeDark:'#0037b3', nodeBorder:'#2255cc' },
  fauna:{ shape:'circle', groupFill:'#d4f5d4', groupStroke:'#5ab85a', nodeFill:'#d4f5d4', nodeDark:'#007a00', nodeBorder:'#228822' },
  hostiles:{ shape:'diamond', groupFill:'#fff3cc', groupStroke:'#c8a030', nodeFill:'#fff3cc', nodeDark:'#9a7000', nodeBorder:'#b08820' },
  settlements:{ shape:'diamond', groupFill:'#daeeff', groupStroke:'#4d9fd4', nodeFill:'#daeeff', nodeDark:'#005fa3', nodeBorder:'#2277bb' }
};

const NODES={
  Player:         {x:160, y:130, cat:'player_defense', val:50, label:'Player'},
  IronGolem:      {x:160, y:330, cat:'player_defense', val:50, label:'Iron Golem'},
  Weed:           {x:430, y:130, cat:'flora',          val:50, label:'Weed'},
  Berries:        {x:430, y:330, cat:'flora',          val:50, label:'Berries'},
  Trees:          {x:430, y:530, cat:'flora',          val:50, label:'Trees'},
  Fox:            {x:700, y:180, cat:'fauna',          val:50, label:'Fox'},
  Cow:            {x:700, y:380, cat:'fauna',          val:50, label:'Cow'},
  Zombies:        {x:160, y:730, cat:'hostiles',       val:50, label:'Zombies'},
  ZombieVillages: {x:430, y:730, cat:'hostiles',       val:50, label:'Zombie\nVillages'},
  Villages:       {x:700, y:580, cat:'settlements',    val:50, label:'Villages'},
  MobSpawner:     {x:700, y:780, cat:'settlements',    val:50, label:'Mob\nSpawner'}
};

const EDGES=[
  ['Fox', 'Weed', -1], ['Cow', 'Weed', -1], ['Berries', 'Fox', 1], ['Fox', 'Cow', -1],
  ['Trees', 'Berries', 1], ['ZombieVillages', 'Trees', -1], ['Zombies', 'ZombieVillages', 1],
  ['Fox', 'Zombies', -1], ['Zombies', 'Villages', -1], ['IronGolem', 'Zombies', -1],
  ['IronGolem', 'Villages', 1], ['MobSpawner', 'ZombieVillages', 1], ['MobSpawner', 'Zombies', 1],
  ['Player', 'Zombies', -1], ['Zombies', 'Player', -1], ['Player', 'Villages', 1], ['Villages', 'Weed', 1]
];

const GROUP_BOUNDS={
  player_defense: {x:90,  y:60,  w:140, h:340, label:'Player & Defenses'},
  flora:          {x:360, y:60,  w:140, h:540, label:'Flora'},
  fauna:          {x:630, y:110, w:140, h:340, label:'Fauna'},
  hostiles:       {x:90,  y:660, w:410, h:140, label:'Hostile Mobs'},
  settlements:    {x:630, y:510, w:140, h:340, label:'Settlements'}
};

Object.entries(GROUP_BOUNDS).forEach(([cat,b])=>{
  const c=CAT[cat];
  const shadow=se('rect'); sa(shadow,{x:b.x+4,y:b.y+4,width:b.w,height:b.h,rx:18,fill:'#00000018'}); gGroups.appendChild(shadow);
  const box=se('rect'); sa(box,{x:b.x,y:b.y,width:b.w,height:b.h,rx:18,fill:c.groupFill,stroke:c.groupStroke,'stroke-width':'2',opacity:'0.7'}); gGroups.appendChild(box);
  const txt=se('text'); sa(txt,{x:b.x+16,y:b.y+22,'font-family':'Segoe UI,Arial,sans-serif','font-size':'12','font-weight':'700',fill:c.nodeDark,opacity:'0.85','pointer-events':'none'}); txt.textContent=b.label; gGroups.appendChild(txt);
});

const SH={rect:64,circle:88,diamond:68};
const ST={rect:-32,circle:-44,diamond:-34};

function makeShapeEl(shape,fillCol,strokeCol,sw){
  let e;
  if(shape==='circle'){ e=se('circle'); sa(e,{r:'44',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'}); }
  else if(shape==='diamond'){ e=se('polygon'); sa(e,{points:'0,-34 52,0 0,34 -52,0',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'}); }
  else { e=se('rect'); sa(e,{x:'-58',y:'-32',width:'116',height:'64',rx:'10',fill:fillCol,stroke:strokeCol||'none','stroke-width':sw||'0'}); }
  return e;
}

const clipRects={};
for(const name of Object.keys(NODES)){
  const cp=se('clipPath'); sa(cp,{id:'cp_'+name});
  const cr=se('rect'); sa(cr,{x:'-80',y:'200',width:'200',height:'0'}); cp.appendChild(cr); defsEl.appendChild(cp);
  clipRects[name]=cr;
}

const nodeEls={};
for(const[name,nd]of Object.entries(NODES)){
  const c=CAT[nd.cat];
  const sh=c.shape;
  const g=se('g'); sa(g,{transform:`translate(${nd.x},${nd.y})`}); g.style.cursor='pointer';
  
  g.appendChild(makeShapeEl(sh,c.nodeFill,c.nodeBorder,'2.5'));
  const fillEl=makeShapeEl(sh,c.nodeDark,'none','0'); sa(fillEl,{'clip-path':`url(#cp_${name})`}); g.appendChild(fillEl);

  const lines=nd.label.split('\n');
  const lh=13;
  const labelEls=lines.map((line,i)=>{
    const t=se('text'); t.textContent=line;
    sa(t,{x:'0',y:String((i-(lines.length-1)/2)*lh-6),'text-anchor':'middle','dominant-baseline':'middle','font-family':'Segoe UI,Arial,sans-serif','font-size':'11','font-weight':'600',fill:'#1a1a1a','pointer-events':'none'});
    g.appendChild(t); return t;
  });

  const valEl=se('text'); sa(valEl,{x:'0',y:String(lines.length*lh/2+5),'text-anchor':'middle','dominant-baseline':'middle','font-family':'Segoe UI,Arial,sans-serif','font-size':'10',fill:'#333','pointer-events':'none'}); g.appendChild(valEl);

  g.addEventListener('click',e=>{ e.stopPropagation(); propagate(name,e.shiftKey?-10:10); });
  gNodes.appendChild(g);
  nodeEls[name]={labelEls,valEl};
  renderNode(name);
}

function renderNode(name){
  const nd=NODES[name]; nd.val=Math.max(0,Math.min(100,nd.val));
  const pct=nd.val/100; const sh=CAT[nd.cat].shape;
  const fh=SH[sh], ty=ST[sh]; const fillH=fh*pct;
  const cr=clipRects[name]; cr.setAttribute('y',String(ty+fh-fillH)); cr.setAttribute('height',String(fillH+2));
  const{labelEls,valEl}=nodeEls[name]; valEl.textContent=Math.round(nd.val)+'%';
  const bright=pct>0.55;
  labelEls.forEach(t=>t.setAttribute('fill',bright?'#ffffff':'#1a1a1a'));
  valEl.setAttribute('fill',bright?'#ffffffcc':'#333333');
}

function orthogonalPath(x1,y1,x2,y2,offset=0){
  const mx=(x1+x2)/2+offset; return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${x2} ${y2}`;
}

function orthogonalPoint(x1,y1,x2,y2,offset,t){
  const mx=(x1+x2)/2+offset;
  const segs=[{x1:x1,y1:y1,x2:mx,y2:y1},{x1:mx,y1:y1,x2:mx,y2:y2},{x1:mx,y1:y2,x2:x2,y2:y2}];
  const lens=segs.map(s=>Math.hypot(s.x2-s.x1,s.y2-s.y1)); const total=lens.reduce((a,b)=>a+b,0);
  let dist=t*total;
  for(let i=0;i<segs.length;i++){
    if(dist<=lens[i]){ const p=dist/lens[i]; return{x:segs[i].x1+(segs[i].x2-segs[i].x1)*p,y:segs[i].y1+(segs[i].y2-segs[i].y1)*p}; }
    dist-=lens[i];
  }
  return{x:x2,y:y2};
}

const edgeData=[]; let edgeIndex=0;
for(const[from,to,pol]of EDGES){
  const a=NODES[from]; const b=NODES[to]; const lane=((edgeIndex%7)-3)*22; edgeIndex++;
  const path=se('path');
  sa(path,{d:orthogonalPath(a.x,a.y,b.x,b.y,lane),fill:'none',stroke:pol>0?'#1e90ff':'#ff4444','stroke-width':'2','stroke-dasharray':pol<0?'7 4':'none','marker-end':pol>0?'url(#mBlue)':'url(#mRed)',opacity:'0.5'});
  gLinks.appendChild(path); edgeData.push({from,to,pol,lane,path});
}

function spawnNodeShade(nodeName, isIncrease, delayMs) {
  setTimeout(() => {
    const node = NODES[nodeName]; const shade = se('circle');
    sa(shade, {cx:node.x,cy:node.y,r:'95',fill:isIncrease?'url(#gradBlue)':'url(#gradRed)',class:'node-shade'});
    gShades.appendChild(shade); requestAnimationFrame(()=>shade.classList.add('active'));
  }, delayMs);
}

const PULSE_SPEED = 0.005;
function animatePulse(from,to,delta,delayMs){
  setTimeout(() => {
    const a=NODES[from],b=NODES[to]; const col=delta>0?'#1e90ff':'#ff4444';
    const g=se('g'); const dot=se('circle'); sa(dot,{r:'9',fill:col,opacity:'0.9'}); g.appendChild(dot); gPulses.appendChild(g);
    let t=0;
    function step(){
      t += PULSE_SPEED; const edge = edgeData.find(e=>e.from===from && e.to===to); if(!edge){g.remove();return;}
      const pt = orthogonalPoint(a.x,a.y,b.x,b.y,edge.lane,Math.min(t,1)); g.setAttribute('transform',`translate(${pt.x},${pt.y})`);
      if(t<1) requestAnimationFrame(step); else g.remove();
    }
    requestAnimationFrame(step);
  }, delayMs);
}

function propagate(startName,delta){
  gShades.innerHTML = ''; NODES[startName].val+=delta; renderNode(startName); spawnNodeShade(startName, delta>0, 0);
  const queue=[{node:startName,delta,time:0,depth:0}]; const visited=new Set([startName]);
  const stepDelay = (1/PULSE_SPEED)*16.67 + 120;
  while(queue.length){
    const cur=queue.shift(); if(cur.depth>=5)continue;
    for(const[from,to,pol]of EDGES){
      if(from!==cur.node)continue;
      const nd=cur.delta*pol*0.65; const nt=cur.time+stepDelay;
      animatePulse(from,to,nd,cur.time); spawnNodeShade(to, nd>0, nt);
      setTimeout(()=>{ NODES[to].val+=nd; renderNode(to); }, nt);
      if(!visited.has(to)){ visited.add(to); queue.push({node:to,delta:nd,time:nt,depth:cur.depth+1}); }
    }
  }
}

function resetAll(){ gShades.innerHTML=''; for(const name of Object.keys(NODES)){NODES[name].val=50;renderNode(name);} }

let pan={x:0,y:0},scale=1,panning=false,ps={x:0,y:0};
function applyT(){vp.setAttribute('transform',`translate(${pan.x},${pan.y}) scale(${scale})`);}

const wW=window.innerWidth||1200, wH=window.innerHeight||800;
scale=Math.min((wW-60)/1080,(wH-60)/970,1)*0.92; pan={x:(wW-1080*scale)/2,y:(wH-970*scale)/2}; applyT();

svgEl.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(0.2,Math.min(3,scale*(e.deltaY<0?1.1:0.91)));applyT();},{passive:false});
svgEl.addEventListener('mousedown',e=>{if(e.target===svgEl||e.target.id==='vp'||e.target.tagName==='rect'){panning=true;ps={x:e.clientX-pan.x,y:e.clientY-pan.y};svgEl.style.cursor='grabbing';}});
window.addEventListener('mousemove',e=>{if(panning){pan={x:e.clientX-ps.x,y:e.clientY-ps.y};applyT();}});
window.addEventListener('mouseup',()=>{panning=false;svgEl.style.cursor='';});
function zoomBy(f){scale=Math.max(0.2,Math.min(3,scale*f));applyT();}
</script>
</body>
</html>
